apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: sonic-interlink
spec:
  interval: 1m
  chart:
    spec:
      chart: supersonic
      version: "0.3.0"
      sourceRef:
        kind: HelmRepository
        name: fastml
      interval: 1m
  install:
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
  valuesFrom:
    - kind: ConfigMap
      name: supersonic-interlink-config
      valuesKey: values.yaml
  # Helm chart has no triton env hook; patch rendered Deployment (container name: triton-server).
  postRenderers:
    - kustomize:
        patches:
          - patch: |-
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: sonic-interlink-triton
                namespace: sonic
              spec:
                template:
                  spec:
                    containers:
                      - name: triton-server
                        env:
                          - name: GRPC_VERBOSITY
                            value: INFO
                          - name: GRPC_TRACE
                            value: tcp,connectivity_state
            target:
              group: apps
              version: v1
              kind: Deployment
              name: sonic-interlink-triton
              namespace: sonic
