apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: sonic-interlink
spec:
  interval: 1m
  chart:
    spec:
      chart: supersonic
      version: "0.3.0"
      sourceRef:
        kind: HelmRepository
        name: fastml
      interval: 1m
  install:
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
  valuesFrom:
    - kind: ConfigMap
      name: supersonic-interlink-config
      valuesKey: values.yaml
  # Helm chart has no triton env hook; JSON6902 add is reliable (strategic merge often no-ops here).
  # Container 0 must remain triton-server (chart order).
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: apps
              version: v1
              kind: Deployment
              name: sonic-interlink-triton
            patch: |-
              - op: add
                path: /spec/template/spec/containers/0/env
                value:
                  - name: GRPC_VERBOSITY
                    value: INFO
                  - name: GRPC_TRACE
                    value: tcp,connectivity_state
