<!DOCTYPE html>
<html lang="en" data-theme="system">
<head>
  <meta charset="UTF-8" />
  <title>Kubernetes Service Pod Topology Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <script>
    (function () {
      try {
        var v = localStorage.getItem("service-monitor-theme");
        document.documentElement.dataset.theme =
          v === "light" || v === "dark" || v === "system" ? v : "system";
      } catch (e) {
        document.documentElement.dataset.theme = "system";
      }
    })();
  </script>
  <style>
    :root {
      --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;

      --color-ready-dark: #9fe1cb;
      --color-notready-dark: #fac775;
      --color-danger-dark: #f09595;
      --color-terminating-dark: #a855f7;
      --color-exposed-dark: #c4c4c4;

      --radius-base: 8px;
      --radius-sm: 5px;
      --radius-pill: 999px;

      --timeline-height: 12px;

      /* Spacing — 4px grid */
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;

      /* Rhythm aliases: sections vs. tight insets */
      --page-panel-gap: var(--space-3);
      --gap-stack: var(--space-3);
      --gap-dense: var(--space-2);
      /* Envoy panel: vertical space between blocks (head / titled sections) vs. label → its pills */
      --envoy-block-gap: var(--space-4);
      --envoy-title-to-pills: var(--space-2);

      /* Type scale */
      --text-micro: 0.5625rem;
      --text-2xs: 0.625rem;
      --text-xs: 0.6875rem;
      --text-sm: 0.8125rem;
      --text-base: 0.875rem;
      --text-ui: 0.9375rem;

      --leading-tight: 1.35;
      --leading-normal: 1.5;
      --letter-overline: 0.06em;

      --pad-page: var(--space-4);
      --pad-section-y: var(--space-4);
      --pad-section-x: var(--space-4);
      --pad-card-y: var(--space-3);
      --pad-card-x: var(--space-4);
      /* Pod / chip inner padding: vertical slightly tighter than section chrome */
      --pad-card: var(--pad-card-y);
    }

    html[data-theme="light"] {
      --color-bg: #f5f5f7;
      --color-surface: #ffffff;
      --color-border: #d1d5db;
      --color-text: #111827;
      --color-text-muted: #6b7280;

      --color-ready: #1d9e75;
      --color-notready: #ef9f27;
      --color-danger: #e24b4a;
      --color-terminating: #6d28d9;
      --color-pending: #9ca3af;
      --color-exposed: #185fa5;

      --color-alert-bg: #fee2e2;
      --color-alert-border: #fca5a5;
      --color-alert-text: #991b1b;

      --color-badge-bg: #e5e7eb;
      --color-badge-text: #374151;

      --color-autoscale-seg-divider: rgba(148, 163, 184, 0.38);

      --chrome-fill-subtle: rgba(15, 23, 42, 0.04);
      --chrome-fill-muted: rgba(148, 163, 184, 0.08);
      --chrome-fill-risk: rgba(15, 23, 42, 0.03);
      --chrome-border-soft: rgba(148, 163, 184, 0.35);
      --chrome-border-medium: rgba(148, 163, 184, 0.45);
      --chrome-divider: rgba(148, 163, 184, 0.4);
      --chrome-on-tint: rgba(148, 163, 184, 0.12);
      --chrome-hover-border: rgba(148, 163, 184, 0.55);

      --pill-muted-bg: var(--chrome-fill-muted);
      --pill-muted-border: var(--color-border);
      --pill-muted-text: var(--color-text-muted);
    }

    html[data-theme="dark"] {
      --color-bg: #181818;
      --color-surface: #242424;
      --color-border: #3d3d3d;
      --color-text: #f0f0f0;
      --color-text-muted: #a8a8a8;

      --color-ready: var(--color-ready-dark);
      --color-notready: var(--color-notready-dark);
      --color-danger: var(--color-danger-dark);
      --color-terminating: var(--color-terminating-dark);
      --color-pending: #737373;
      --color-exposed: var(--color-exposed-dark);

      --color-alert-bg: #3d2020;
      --color-alert-border: #6b3030;
      --color-alert-text: #fecaca;

      --color-badge-bg: #2e2e2e;
      --color-badge-text: #ececec;

      --color-autoscale-seg-divider: rgba(255, 255, 255, 0.12);

      --chrome-fill-subtle: rgba(255, 255, 255, 0.06);
      --chrome-fill-muted: rgba(255, 255, 255, 0.1);
      --chrome-fill-risk: rgba(255, 255, 255, 0.05);
      --chrome-border-soft: rgba(255, 255, 255, 0.14);
      --chrome-border-medium: rgba(255, 255, 255, 0.22);
      --chrome-divider: rgba(255, 255, 255, 0.12);
      --chrome-on-tint: rgba(255, 255, 255, 0.08);
      --chrome-hover-border: rgba(255, 255, 255, 0.32);

      --pill-muted-bg: var(--chrome-fill-muted);
      --pill-muted-border: var(--color-border);
      --pill-muted-text: var(--color-text-muted);
    }

    html[data-theme="system"] {
      --color-bg: #f5f5f7;
      --color-surface: #ffffff;
      --color-border: #d1d5db;
      --color-text: #111827;
      --color-text-muted: #6b7280;

      --color-ready: #1d9e75;
      --color-notready: #ef9f27;
      --color-danger: #e24b4a;
      --color-terminating: #6d28d9;
      --color-pending: #9ca3af;
      --color-exposed: #185fa5;

      --color-alert-bg: #fee2e2;
      --color-alert-border: #fca5a5;
      --color-alert-text: #991b1b;

      --color-badge-bg: #e5e7eb;
      --color-badge-text: #374151;

      --color-autoscale-seg-divider: rgba(148, 163, 184, 0.38);

      --chrome-fill-subtle: rgba(15, 23, 42, 0.04);
      --chrome-fill-muted: rgba(148, 163, 184, 0.08);
      --chrome-fill-risk: rgba(15, 23, 42, 0.03);
      --chrome-border-soft: rgba(148, 163, 184, 0.35);
      --chrome-border-medium: rgba(148, 163, 184, 0.45);
      --chrome-divider: rgba(148, 163, 184, 0.4);
      --chrome-on-tint: rgba(148, 163, 184, 0.12);
      --chrome-hover-border: rgba(148, 163, 184, 0.55);

      --pill-muted-bg: var(--chrome-fill-muted);
      --pill-muted-border: var(--color-border);
      --pill-muted-text: var(--color-text-muted);
    }

    @media (prefers-color-scheme: dark) {
      html[data-theme="system"] {
        --color-bg: #181818;
        --color-surface: #242424;
        --color-border: #3d3d3d;
        --color-text: #f0f0f0;
        --color-text-muted: #a8a8a8;

        --color-ready: var(--color-ready-dark);
        --color-notready: var(--color-notready-dark);
        --color-danger: var(--color-danger-dark);
        --color-terminating: var(--color-terminating-dark);
        --color-pending: #737373;
        --color-exposed: var(--color-exposed-dark);

        --color-alert-bg: #3d2020;
        --color-alert-border: #6b3030;
        --color-alert-text: #fecaca;

        --color-badge-bg: #2e2e2e;
        --color-badge-text: #ececec;

        --color-autoscale-seg-divider: rgba(255, 255, 255, 0.12);

        --chrome-fill-subtle: rgba(255, 255, 255, 0.06);
        --chrome-fill-muted: rgba(255, 255, 255, 0.1);
        --chrome-fill-risk: rgba(255, 255, 255, 0.05);
        --chrome-border-soft: rgba(255, 255, 255, 0.14);
        --chrome-border-medium: rgba(255, 255, 255, 0.22);
        --chrome-divider: rgba(255, 255, 255, 0.12);
        --chrome-on-tint: rgba(255, 255, 255, 0.08);
        --chrome-hover-border: rgba(255, 255, 255, 0.32);

        --pill-muted-bg: var(--chrome-fill-muted);
        --pill-muted-border: var(--color-border);
        --pill-muted-text: var(--color-text-muted);
      }
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      margin: 0;
      padding: var(--pad-page);
      font-family: var(--font-sans);
      font-size: var(--text-ui);
      line-height: var(--leading-normal);
      background-color: var(--color-bg);
      color: var(--color-text);
      -webkit-font-smoothing: antialiased;
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: var(--page-panel-gap);
      min-height: calc(100vh - 2 * var(--pad-page));
    }

    .top-bar {
      display: flex;
      flex-wrap: nowrap;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--gap-stack);
      background-color: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-base);
      padding: var(--pad-section-y) var(--pad-section-x);
      min-width: 0;
    }

    .top-bar-cluster {
      display: flex;
      flex-wrap: nowrap;
      align-items: stretch;
      gap: var(--space-4);
      min-width: 0;
      flex: 1 1 auto;
    }

    .top-bar-brand {
      display: flex;
      align-items: center;
      flex-shrink: 0;
      padding: var(--space-2) var(--space-3) var(--space-2) var(--space-2);
    }

    /* Release | namespace on one row; Risk / Issues / OK on the row below. */
    .top-bar-primary {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: var(--gap-stack);
      flex: 1 1 auto;
      min-width: 0;
    }

    .top-bar-target-row {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: var(--gap-stack) var(--space-4);
    }

    .top-bar-field {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: var(--space-1);
      min-width: 0;
    }

    .top-bar-field > .service-chip {
      flex-shrink: 0;
    }

    .top-bar-field-label {
      font-size: var(--text-2xs);
      font-weight: 600;
      letter-spacing: var(--letter-overline);
      text-transform: uppercase;
      color: var(--color-text-muted);
      line-height: var(--leading-tight);
      cursor: pointer;
      user-select: none;
    }

    @media (max-width: 720px) {
      .top-bar {
        flex-wrap: wrap;
      }

      .top-bar-cluster {
        flex-wrap: wrap;
      }
    }

    .service-chip {
      display: inline-flex;
      align-items: center;
      gap: var(--gap-dense);
      padding: var(--gap-dense) var(--pad-card-x);
      border-radius: var(--radius-pill);
      border: 1px solid var(--color-border);
      background-color: var(--color-bg);
      font-size: var(--text-base);
      font-weight: 500;
      line-height: var(--leading-tight);
      transition: border-color 0.15s ease, background-color 0.15s ease;
    }

    #service-main-chip.service-main-chip--ok {
      border-color: rgba(16, 185, 129, 0.42);
      background: rgba(16, 185, 129, 0.06);
    }

    #service-main-chip.service-main-chip--warn {
      border-color: rgba(245, 158, 11, 0.48);
      background: rgba(245, 158, 11, 0.07);
    }

    #service-main-chip.service-main-chip--bad {
      border-color: rgba(220, 38, 38, 0.45);
      background: rgba(220, 38, 38, 0.07);
    }

    .service-health-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      width: 14px;
      height: 14px;
    }

    #service-main-chip .service-health-wrap .dot {
      background-color: var(--color-ready);
    }

    #service-main-chip.service-main-chip--warn .service-health-wrap .dot {
      background-color: var(--color-notready);
    }

    #service-main-chip.service-main-chip--bad .service-health-wrap .dot {
      background-color: var(--color-danger);
    }

    .service-health-disconnected-icon {
      display: none;
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      color: var(--color-danger);
    }

    .service-health-wrap--offline .dot {
      display: none !important;
    }

    .service-health-wrap--offline .service-health-disconnected-icon {
      display: block;
    }

    .service-name-input {
      border: none;
      padding: 0;
      margin: 0;
      background: transparent;
      font: inherit;
      min-width: 120px;
      max-width: 220px;
      outline: none;
      color: inherit;
    }

    #namespace-input.service-name-input {
      min-width: 5.5rem;
      max-width: 11rem;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      flex-shrink: 0;
    }

    /* ~4× header risk-pill height (~20px → ~80px) */
    .top-bar-logo {
      height: auto;
      width: auto;
      max-height: 80px;
      max-width: min(176px, 42vw);
      flex-shrink: 0;
      object-fit: contain;
      object-position: left center;
    }

    .top-bar-logo--for-light,
    .top-bar-logo--for-dark {
      display: none;
    }

    html[data-theme="light"] .top-bar-logo--for-light,
    html[data-theme="dark"] .top-bar-logo--for-dark {
      display: block;
    }

    html[data-theme="system"] .top-bar-logo--for-light {
      display: block;
    }

    html[data-theme="system"] .top-bar-logo--for-dark {
      display: none;
    }

    @media (prefers-color-scheme: dark) {
      html[data-theme="system"] .top-bar-logo--for-light {
        display: none;
      }

      html[data-theme="system"] .top-bar-logo--for-dark {
        display: block;
      }
    }

    .top-bar-meta {
      display: flex;
      flex-wrap: nowrap;
      align-items: center;
      gap: var(--gap-dense);
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      flex-shrink: 0;
      min-width: 0;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: var(--space-1);
    }

    .meta-label {
      font-weight: 500;
    }

    .meta-value-warn {
      color: var(--color-notready);
    }

    .meta-value-bad {
      color: var(--color-danger);
    }

    .meta-value-ok {
      color: var(--color-ready);
    }

    .risk-pill {
      display: inline-flex;
      align-items: center;
      gap: var(--gap-dense);
      padding: var(--gap-dense) var(--gap-stack);
      border-radius: var(--radius-pill);
      border: 1px solid var(--chrome-border-medium);
      background: var(--chrome-fill-risk);
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      line-height: var(--leading-tight);
      white-space: nowrap;
    }
    .risk-pill-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      color: var(--color-text-muted);
    }

    .risk-pill-icon svg {
      width: 14px;
      height: 14px;
    }

    .risk-pill--ok .risk-pill-icon {
      color: var(--color-ready);
    }

    .risk-pill--warn .risk-pill-icon {
      color: var(--color-notready);
    }

    .risk-pill--bad .risk-pill-icon {
      color: var(--color-danger);
    }

    .autoscaling-section.envoy-section {
      padding: var(--pad-section-y) var(--pad-section-x);
    }

    .autoscaling-section .envoy-header {
      font-size: var(--text-xs);
      margin-bottom: var(--space-1);
    }

    .autoscaling-section .envoy-body {
      flex-direction: column;
      align-items: stretch;
      align-content: stretch;
      gap: var(--gap-stack);
    }

    .autoscale-row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--gap-dense) var(--gap-stack);
      align-items: center;
      width: 100%;
      box-sizing: border-box;
    }

    .autoscale-row--promql > details.autoscaling-promql:not([open]) {
      width: max-content;
      max-width: 100%;
      min-width: 0;
    }

    .autoscale-row--promql > details.autoscaling-promql[open] {
      width: 100%;
      min-width: 0;
    }

    .autoscale-promql-copy-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-1);
      margin: 0;
      padding: 3px var(--space-2);
      flex-shrink: 0;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      background: var(--color-surface);
      color: var(--color-text-muted);
      cursor: pointer;
      box-sizing: border-box;
      font: inherit;
      font-size: var(--text-2xs);
      font-weight: 600;
      line-height: var(--leading-tight);
      appearance: none;
      -webkit-appearance: none;
      transition: background 0.12s ease, color 0.12s ease, border-color 0.12s ease;
    }

    .autoscale-promql-copy-btn:hover {
      color: var(--color-text);
      border-color: var(--chrome-hover-border);
      background: var(--color-bg);
    }

    .autoscale-promql-copy-btn svg {
      display: block;
      flex-shrink: 0;
      width: 11px;
      height: 11px;
      pointer-events: none;
    }

    .autoscale-promql-copy-btn.autoscale-promql-copy-btn--done {
      color: var(--color-ready);
      border-color: rgba(29, 158, 117, 0.55);
    }

    /* Replica summary: same surface treatment as .envoy-pill, single horizontal strip */
    .autoscale-replicas-pill.envoy-pill {
      flex: 0 0 auto;
      align-items: center;
      padding: var(--space-1) var(--space-1) var(--space-1) var(--space-3);
      gap: var(--space-2);
      max-width: 100%;
    }

    .autoscale-replica-stats {
      display: inline-flex;
      align-items: center;
      flex-wrap: nowrap;
    }

    .autoscale-replica-seg {
      display: inline-flex;
      align-items: baseline;
      gap: var(--space-1);
      padding: 0 var(--space-2);
      border-left: 1px solid var(--color-autoscale-seg-divider);
    }

    .autoscale-replica-seg:first-child {
      border-left: none;
      padding-left: 0;
    }

    .autoscale-replica-seg-k {
      font-size: var(--text-2xs);
      font-weight: 500;
      text-transform: lowercase;
      letter-spacing: 0.02em;
      color: var(--color-text-muted);
    }

    .autoscale-replica-seg-v {
      font-family: var(--font-mono);
      font-size: var(--text-base);
      font-weight: 600;
      color: var(--color-text);
      font-variant-numeric: tabular-nums;
      min-width: 0.65em;
      text-align: right;
    }

    .autoscale-replica-seg--pending .autoscale-replica-seg-v {
      color: var(--color-notready);
    }

    .autoscaling-prometheus-error {
      flex: 1 1 100%;
      margin: 0;
      font-size: var(--text-xs);
      line-height: var(--leading-normal);
      color: var(--color-danger);
    }

    .autoscale-row--promql {
      width: 100%;
    }

    .autoscaling-section details.autoscaling-promql {
      display: block;
      margin: 0;
      min-width: 0;
    }

    .autoscaling-section details.autoscaling-promql[open] {
      width: 100%;
    }

    .autoscale-promql-actions {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      margin: 0;
    }

    details.autoscaling-promql.details-toggle textarea.autoscaling-query-input {
      display: block;
      width: 100%;
      box-sizing: border-box;
      margin: 0;
      padding: var(--gap-dense) var(--gap-stack);
      border-radius: var(--radius-sm);
      border: 1px solid var(--color-border);
      background: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-mono);
      font-size: var(--text-2xs);
      line-height: var(--leading-tight);
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: break-word;
      overflow-x: hidden;
      overflow-y: hidden;
      resize: none;
      min-height: 4rem;
      max-height: none;
      cursor: text;
      user-select: text;
    }

    .timer {
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--color-text-muted);
      line-height: var(--leading-tight);
    }

    .last-sync {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      text-align: right;
      max-width: 280px;
      line-height: var(--leading-tight);
    }

    .last-sync--warn {
      color: var(--color-notready);
    }

    .top-bar-right {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      justify-content: flex-end;
      gap: var(--gap-stack);
      flex-shrink: 0;
    }

    .top-bar-right-times {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: flex-start;
      gap: var(--space-1);
      padding-top: var(--space-1);
    }

    .theme-switch {
      display: inline-flex;
      align-items: center;
      gap: 0;
      padding: var(--space-1);
      border-radius: var(--radius-sm);
      border: 1px solid var(--color-border);
      background: var(--color-bg);
    }

    .theme-switch-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 30px;
      margin: 0;
      padding: 0;
      border: none;
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--color-text-muted);
      cursor: pointer;
      transition: background 0.12s ease, color 0.12s ease;
    }

    .theme-switch-btn:hover {
      color: var(--color-text);
      background: var(--chrome-on-tint);
    }

    .theme-switch-btn[aria-pressed="true"] {
      color: var(--color-text);
      background: var(--color-surface);
      box-shadow: 0 0 0 1px var(--color-border);
    }

    .theme-switch-btn svg {
      flex-shrink: 0;
    }

    .theme-switch-btn:focus-visible {
      outline: 2px solid var(--color-exposed);
      outline-offset: 2px;
    }

    /* Alert banner removed; traffic risk is shown inline in the header. */

    .filter-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: var(--gap-dense);
      align-items: center;
    }

    .filter-buttons button:disabled {
      pointer-events: none;
      opacity: 0.45;
      color: var(--color-text-muted);
      border-color: var(--color-border);
      cursor: not-allowed;
    }

    .filter-buttons button.active:disabled {
      border-color: var(--color-border);
      color: var(--color-text-muted);
    }

    button {
      border-radius: var(--radius-pill);
      border: 1px solid var(--color-border);
      padding: var(--gap-dense) var(--pad-section-x);
      font-size: var(--text-sm);
      font-weight: 500;
      line-height: var(--leading-tight);
      cursor: pointer;
      background-color: var(--color-surface);
      color: var(--color-text);
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
    }

    button.active {
      border-color: var(--color-exposed);
      color: var(--color-exposed);
    }

    button:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .pods-section {
      background-color: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-base);
      padding: var(--pad-section-y) var(--pad-section-x);
      display: flex;
      flex-direction: column;
      gap: var(--gap-stack);
    }

    .pods-section-head {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: var(--gap-dense) var(--gap-stack);
    }

    .pods-header {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: var(--letter-overline);
      flex-shrink: 0;
    }

    .pods-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(288px, 1fr));
      gap: var(--gap-stack);
    }

    .pod-card {
      border-radius: var(--radius-base);
      border: 1px solid var(--color-border);
      padding: var(--pad-card) var(--pad-card-x);
      font-size: var(--text-base);
      display: flex;
      flex-direction: column;
      gap: var(--gap-dense);
      cursor: pointer;
      background-color: var(--color-bg);
      min-width: 0;
    }

    .pod-card.exposed-unready {
      border-color: var(--color-danger);
      background-color: rgba(226, 75, 74, 0.06);
    }

    .pod-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--gap-dense);
    }

    .pod-title {
      display: flex;
      align-items: center;
      gap: var(--gap-dense);
      min-width: 0;
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      flex-shrink: 0;
    }

    .status-dot.ready {
      background-color: var(--color-ready);
    }

    .status-dot.notready {
      background-color: var(--color-notready);
    }

    .status-dot.danger {
      background-color: var(--color-danger);
    }

    .status-dot.terminating {
      background-color: var(--color-terminating);
    }

    .status-dot.pending {
      background-color: var(--color-pending);
    }

    .status-dot.blinking {
      animation: crashBlink 1s infinite;
    }

    .status-marker-traffic-risk {
      flex-shrink: 0;
      width: 14px;
      height: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-sm);
      line-height: 1;
      color: var(--color-danger);
      user-select: none;
    }

    @keyframes crashBlink {
      0% { opacity: 1; }
      50% { opacity: 0.3; }
      100% { opacity: 1; }
    }

    .pod-name {
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: var(--leading-tight);
    }

    .pod-card.exposed-unready .pod-name {
      color: var(--color-danger);
    }

    .pod-badges {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: var(--space-1);
      margin-top: var(--space-1);
      min-width: 0;
    }

    .pod-status-column {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: var(--space-1);
      min-width: 0;
      width: 100%;
    }

    /* State + status pills: same chrome; width fits text, capped (ellipsis inside). */
    .pod-badges .pod-status-line-pill {
      align-self: flex-start;
      width: fit-content;
      max-width: min(100%, 280px);
      min-width: 0;
      box-sizing: border-box;
      display: inline-flex;
      align-items: center;
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      font-weight: 500;
      line-height: var(--leading-tight);
      text-transform: none;
      letter-spacing: 0.02em;
      overflow: hidden;
    }

    .pod-status-line-text {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .pod-meta {
      display: grid;
      grid-template-columns: auto auto;
      row-gap: var(--space-1);
      column-gap: var(--space-3);
      font-size: var(--text-xs);
      line-height: var(--leading-tight);
      color: var(--color-text-muted);
    }

    .pod-meta-label {
      text-transform: uppercase;
      letter-spacing: var(--letter-overline);
      font-weight: 600;
      font-size: var(--text-2xs);
    }

    .pod-meta-value {
      font-family: var(--font-mono);
    }

    .pod-detail-block {
      margin-top: var(--gap-stack);
      font-size: var(--text-2xs);
      line-height: var(--leading-tight);
      color: var(--color-text-muted);
      display: flex;
      flex-direction: column;
      gap: var(--gap-dense);
    }

    .pod-detail-title {
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: var(--letter-overline);
      font-size: var(--text-2xs);
      color: var(--color-text);
    }

    .cond-row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-1);
    }

    .cond-chip.envoy-pill {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      white-space: normal;
      max-width: 100%;
    }

    .endpoint-row {
      font-family: var(--font-mono);
      font-size: var(--text-2xs);
      line-height: var(--leading-tight);
    }

    .ep-chips {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: var(--space-1);
      width: 100%;
      min-width: 0;
    }

    .ep-chips-label {
      flex-shrink: 0;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: var(--letter-overline);
      font-size: var(--text-2xs);
      color: var(--color-text);
      padding-top: var(--space-1);
      line-height: var(--leading-tight);
    }

    .ep-chips-items {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-start;
      gap: var(--space-1);
      min-width: 0;
      width: 100%;
    }

    .ep-chip.envoy-pill {
      font-size: var(--text-sm);
    }

    /* Labels stay muted; pill chrome + value use envoy variant colors */
    .ep-chip .ep-chip-key {
      font-weight: 500;
      text-transform: lowercase;
      letter-spacing: 0.02em;
      color: var(--color-text-muted);
    }

    .ep-chip .ep-chip-val {
      font-weight: 600;
      color: inherit;
    }

    .probe-mini .probe-mini-letter {
      font-weight: 500;
      color: var(--color-text-muted);
    }

    .probe-mini .probe-mini-val {
      font-weight: 600;
      color: inherit;
    }

    /* Probes: same vertical label + row pattern as .ep-chips (Endpoint) */
    .probe-chips-items {
      flex-direction: column;
      align-items: flex-start;
      gap: var(--space-1);
    }

    .probe-mini-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-start;
      gap: var(--gap-dense);
      line-height: var(--leading-tight);
      min-width: 0;
      width: 100%;
    }

    .probe-cname {
      font-family: var(--font-mono);
      font-weight: 600;
      color: var(--color-text);
      margin-right: var(--space-1);
    }

    .probe-mini.envoy-pill {
      flex-shrink: 0;
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      cursor: default;
    }

    .details-toggle {
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      background-color: var(--color-surface);
      padding: var(--space-1) var(--space-2);
    }

    .details-toggle > summary,
    details.autoscaling-promql.details-toggle > summary {
      cursor: pointer;
      user-select: none;
      font-size: var(--text-2xs);
      line-height: var(--leading-tight);
      color: var(--color-text-muted);
    }

    .details-body {
      margin-top: var(--gap-stack);
      border-top: 1px solid var(--color-border);
      padding-top: var(--gap-stack);
      display: flex;
      flex-direction: column;
      gap: var(--gap-dense);
    }

    .pod-spec-detail {
      display: grid;
      grid-template-columns: minmax(0, auto) minmax(0, 1fr);
      gap: var(--space-1) var(--gap-stack);
      font-size: var(--text-2xs);
      line-height: var(--leading-tight);
      margin-top: var(--space-1);
    }

    .pod-spec-detail-label {
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: var(--letter-overline);
      font-weight: 600;
      font-size: var(--text-2xs);
    }

    .pod-spec-detail-value {
      font-family: var(--font-mono);
      word-break: break-all;
      color: var(--color-text);
    }

    .pod-container-line {
      font-family: var(--font-mono);
      font-size: var(--text-2xs);
      line-height: var(--leading-tight);
      color: var(--color-text-muted);
      margin: 0;
      word-break: break-all;
    }

    .envoy-pair {
      display: flex;
      flex-wrap: wrap;
      align-items: stretch;
      gap: var(--page-panel-gap);
    }

    .envoy-pair > .envoy-section {
      flex: 1 1 calc((100% - var(--page-panel-gap)) / 2);
      min-width: min(100%, 280px);
      box-sizing: border-box;
    }

    .envoy-section {
      margin-top: 0;
      border-radius: var(--radius-base);
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      padding: var(--pad-section-y) var(--pad-section-x);
      display: flex;
      flex-direction: column;
      gap: var(--gap-stack);
    }
    .envoy-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: var(--letter-overline);
      margin-bottom: var(--gap-dense);
      line-height: var(--leading-tight);
    }
    .envoy-body {
      display: flex;
      flex-wrap: wrap;
      column-gap: var(--gap-stack);
      row-gap: var(--envoy-block-gap);
      font-size: var(--text-sm);
      line-height: var(--leading-normal);
      color: var(--color-text-muted);
      align-items: flex-start;
    }

    .envoy-upstream-head {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: var(--gap-dense);
      flex: 1 1 100%;
      width: 100%;
      box-sizing: border-box;
    }

    .envoy-panel-section {
      flex: 1 1 100%;
      width: 100%;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: var(--envoy-title-to-pills);
    }

    .envoy-panel-section-title {
      font-size: var(--text-2xs);
      font-weight: 600;
      letter-spacing: var(--letter-overline);
      text-transform: uppercase;
      color: var(--color-text-muted);
      line-height: var(--leading-tight);
      margin: 0;
    }

    .envoy-panel-section-pills {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: var(--gap-dense);
    }

    .envoy-pill {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-1) var(--gap-stack);
      border-radius: var(--radius-pill);
      background: var(--chrome-fill-subtle);
      border: 1px solid var(--chrome-border-soft);
      font-size: var(--text-sm);
      line-height: var(--leading-tight);
      white-space: nowrap;
    }
    .envoy-pill-label {
      font-weight: 500;
      color: var(--color-text);
    }
    .envoy-pill-danger {
      border-color: var(--color-danger);
      background: rgba(220, 38, 38, 0.06);
      color: var(--color-danger);
    }
    .envoy-pill-warn {
      border-color: var(--color-notready);
      background: rgba(245, 158, 11, 0.06);
      color: var(--color-notready);
    }
    .envoy-pill-ok {
      border-color: var(--color-ready);
      background: rgba(16, 185, 129, 0.06);
      color: var(--color-ready);
    }

    /* Low-emphasis pills: same treatment in Envoy, pod cards, probes, autoscale. */
    .envoy-pill-muted {
      background: var(--pill-muted-bg);
      border: 1px solid var(--pill-muted-border);
      color: var(--pill-muted-text);
      font-weight: 500;
    }

    .envoy-pill-muted .envoy-pill-label {
      color: var(--pill-muted-text);
      font-weight: 500;
    }

    .ep-chip.envoy-pill-muted .ep-chip-key,
    .ep-chip.envoy-pill-muted .ep-chip-val {
      color: var(--pill-muted-text);
    }

    .probe-mini.envoy-pill-muted .probe-mini-letter,
    .probe-mini.envoy-pill-muted .probe-mini-val {
      color: var(--pill-muted-text);
    }

    .envoy-pill-terminating {
      border-color: var(--color-terminating);
      background: rgba(109, 40, 217, 0.1);
      color: var(--color-terminating);
    }

    .events-section {
      background-color: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-base);
      padding: var(--pad-section-y) var(--pad-section-x);
      display: flex;
      flex-direction: column;
      gap: var(--gap-stack);
      flex: 1;
      min-height: 220px;
    }

    .events-header {
      font-size: var(--text-sm);
      font-weight: 600;
      letter-spacing: var(--letter-overline);
      text-transform: uppercase;
      color: var(--color-text-muted);
      line-height: var(--leading-tight);
    }

    .events-list {
      flex: 1;
      overflow-y: auto;
      border-radius: var(--radius-sm);
      border: 1px solid var(--color-border);
      background-color: var(--color-bg);
      font-size: var(--text-xs);
      line-height: var(--leading-tight);
    }

    .event-row {
      display: grid;
      grid-template-columns: 70px 190px 1fr;
      gap: var(--gap-dense) var(--gap-stack);
      padding: var(--gap-dense) var(--gap-stack);
      align-items: baseline;
      border-bottom: 1px solid var(--chrome-divider);
      cursor: pointer;
    }

    .event-row:last-child {
      border-bottom: none;
    }

    .event-time {
      font-family: var(--font-mono);
      color: var(--color-text-muted);
      white-space: nowrap;
    }

    .event-pod {
      font-family: var(--font-mono);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--color-text-muted);
    }

    .event-msg {
      overflow: hidden;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      white-space: normal;
      line-height: var(--leading-normal);
    }

    .event-kind {
      display: inline-block;
      margin-right: var(--gap-dense);
      padding: var(--space-1) var(--gap-dense);
      border-radius: var(--radius-sm);
      font-size: var(--text-2xs);
      font-weight: 600;
      letter-spacing: var(--letter-overline);
      text-transform: uppercase;
      vertical-align: 0.05em;
      border: 1px solid var(--color-border);
      background: var(--chrome-on-tint);
      color: var(--color-text-muted);
    }

    .event-kind--traffic {
      border-color: var(--color-danger);
      background: rgba(226, 75, 74, 0.08);
      color: var(--color-danger);
    }

    .event-row.expanded .event-msg {
      -webkit-line-clamp: initial;
      line-clamp: initial;
      overflow: visible;
    }

    .event-ok {
      color: var(--color-ready);
    }

    .event-warn {
      color: var(--color-notready);
    }

    .event-danger {
      color: var(--color-danger);
    }

    @media (max-width: 640px) {
      .event-row {
        grid-template-columns: 58px 1fr;
        grid-template-rows: auto auto;
        row-gap: var(--space-1);
      }
      .event-pod {
        grid-column: 2 / 3;
      }
      .event-msg {
        grid-column: 1 / 3;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <datalist id="namespace-suggestions">
      <option value="sonic"></option>
      <option value="default"></option>
      <option value="kube-system"></option>
    </datalist>
    <div class="top-bar">
      <div class="top-bar-cluster">
        <div class="top-bar-brand">
          <img
            class="top-bar-logo top-bar-logo--for-light"
            src="https://raw.githubusercontent.com/fastmachinelearning/SuperSONIC/main/docs/img/SuperSONIC_small_256.png"
            width="256"
            height="256"
            alt="SuperSONIC"
            decoding="async"
          />
          <img
            class="top-bar-logo top-bar-logo--for-dark"
            src="https://raw.githubusercontent.com/fastmachinelearning/SuperSONIC/main/docs/img/SuperSONIC_small_light_256.png"
            width="256"
            height="256"
            alt="SuperSONIC"
            decoding="async"
          />
        </div>
        <div class="top-bar-primary">
          <div class="top-bar-target-row">
            <div class="top-bar-field">
              <label class="top-bar-field-label" for="service-name-input">SuperSONIC release</label>
              <div class="service-chip service-main-chip--warn" id="service-main-chip" title="">
                <span
                  id="service-health-wrap"
                  class="service-health-wrap"
                  aria-hidden="true"
                >
          <span id="service-health-dot" class="dot"></span>
                  <svg
                    id="service-health-disconnected"
                    class="service-health-disconnected-icon"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2.2"
                    stroke-linecap="round"
                    aria-hidden="true"
                    focusable="false"
                  >
                    <path d="M10 13a5 5 0 0 1 0-7l1.5-1.5a5 5 0 0 1 7 7L17 13" />
                    <path d="M14 11a5 5 0 0 1 0 7l-1.5 1.5a5 5 0 0 1-7-7L9 11" />
                    <line x1="4" y1="4" x2="20" y2="20" />
                  </svg>
                </span>
                <input
                  id="service-name-input"
                  class="service-name-input"
                  type="text"
                  value="sonic-interlink"
                  aria-label="SuperSONIC Helm release name"
                  title="Edit release name, press Enter to apply and refresh"
                />
              </div>
            </div>
            <div class="top-bar-field">
              <label class="top-bar-field-label" for="namespace-input">Namespace</label>
              <div class="service-chip">
                <input
                  id="namespace-input"
                  class="service-name-input"
                  type="text"
                  value="sonic"
                  spellcheck="false"
                  autocapitalize="off"
                  autocomplete="off"
                  list="namespace-suggestions"
                  title="Edit namespace, press Enter to apply and refresh"
                />
              </div>
            </div>
        </div>
        <div class="top-bar-meta">
          <div class="meta-item">
              <span id="header-risk-pill" class="risk-pill risk-pill--bad" title="" style="display:none;">
                <span class="risk-pill-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" focusable="false">
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
                    <line x1="12" y1="9" x2="12" y2="13" />
                    <line x1="12" y1="17" x2="12.01" y2="17" />
                  </svg>
                </span>
                <span id="header-risk-text">Risk 0</span>
              </span>
              <span id="header-issues-pill" class="risk-pill risk-pill--warn" title="" style="display:none;">
                <span class="risk-pill-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" focusable="false">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="12" y1="8" x2="12" y2="12" />
                    <line x1="12" y1="16" x2="12.01" y2="16" />
                  </svg>
                </span>
                <span id="header-issues-text">Issues 0</span>
              </span>
              <span id="header-ok-pill" class="risk-pill risk-pill--ok" title="" style="display:none;">
                <span class="risk-pill-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" focusable="false">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                    <polyline points="22 4 12 14.01 9 11.01" />
                  </svg>

      <div class="top-bar-right">
        <div class="top-bar-right-times">

        <div class="theme-switch" role="group" aria-label="Color theme">

    <div class="envoy-pair">
      <div class="envoy-section">
        <div class="envoy-header">
          <span>Envoy proxy</span>
      </div>
        <div class="envoy-body" id="envoy-panel"></div>

        <div class="envoy-header">
          <span>Envoy Gateway</span>
    </div>
        <div class="envoy-body" id="envoy-gateway-panel"></div>

    <div class="envoy-section autoscaling-section">
      <div class="envoy-header">
        <span>Autoscaling</span>
        </div>
      <div class="envoy-body" id="autoscaling-panel"></div>
        </div>

    <div class="pods-section">
      <div class="pods-section-head">
        <div class="pods-header">Triton servers</div>
        <div class="filter-buttons">
          <button id="filter-all" class="active">All pods</button>
          <button id="filter-ready">Ready</button>
          <button id="filter-notready">Not ready</button>
          <button id="filter-exposed-unready">⚠ Traffic risk</button>
      </div>

      <div class="pods-grid" id="pods-grid"></div>

    <div class="events-section">
      <div class="events-header">Event log</div>
      <div class="events-list" id="events-list"></div>
