  <script>
    const BACKEND_URL =
      window.location.protocol === "file:"
        ? "http://localhost:3000/state"
        : "/state";
    // --- Data model ---------------------------------------------------

    const STATUS = {
      RUNNING_READY: "running-ready",
      RUNNING_NOTREADY: "running-notready",
      PENDING: "pending",
      TERMINATING: "terminating",
      CRASHLOOP: "crashloop"
    };

    const SEVERITY = {
      OK: "ok",
      WARN: "warn",
      DANGER: "danger"
    };

    const service = {
      name: "sonic-interlink",
      namespace: "sonic",
      clusterIP: "",
      ports: []
    };

    function namespaceFromUi() {
      const el = document.getElementById("namespace-input");
      const raw = el && typeof el.value === "string" ? el.value.trim() : "";
      return raw || service.namespace || "sonic";
    }

    const initialPods = () => [];
    const initialEvents = () => [];

    let pods = initialPods();
    let events = initialEvents();

    // Tracking of exposed+unready history for persistence.
    let trafficRiskEverCount = 0;
    let activeEndpointAnomalyCount = 0;
    let activeEndpointIssueWarnCount = 0;
    let activeEndpointIssueDangerCount = 0;
    let lastTrafficRiskIds = new Set();
    let seenAnomalyKeys = new Set();
    /** Pods that currently have an EndpointSlice issue (used to suppress duplicate traffic-risk log lines). */
    let currentEndpointAnomalyPods = new Set();

    /**
     * Only one /state fetch at a time. If polls stack up (slow Envoy kubectl), queue another pass after the
     * current one finishes — avoids discarding every response (refreshRequestId would always be ahead).
     */
    let backendRefreshBusy = false;
    let backendRefreshQueued = false;

    let lastSuccessfulFetchAt = null;
    /** When API returns 0 pods but UI still shows a previous snapshot. */
    let syncWarning = null;
    let lastFetchHttpError = null;
    let lastProxySnapshot = null;
    let lastAutoscaleSnapshot = null;
    /** Survives 1s re-renders of the autoscaling panel */
    let autoscalePromqlDetailsOpen = false;
    /** Keys `namespace/podId` for pod cards whose k8s details stay open across refresh */
    let openPodK8sDetailsIds = new Set();

    // Global tick starts at 22
    let globalTick = 22;

    // Filters
    let activeFilter = "all";

    // --- Helpers ------------------------------------------------------

    function formatTick(t) {
      const mm = String(Math.floor(t / 60)).padStart(2, "0");
      const ss = String(t % 60).padStart(2, "0");
      return `t+${mm}:${ss}`;
    }

    function ageTextToSeconds(ageText) {
      if (!ageText || typeof ageText !== "string") return 0;
      const m = ageText.trim().match(/^(\d+)\s*([smhd])$/i);
      if (!m) return 0;
      const n = parseInt(m[1], 10);
      if (!Number.isFinite(n)) return 0;
      const unit = m[2].toLowerCase();
      if (unit === "s") return n;
      if (unit === "m") return n * 60;
      if (unit === "h") return n * 3600;
      if (unit === "d") return n * 86400;
      return 0;
    }

    function appendEvent(podName, msg, severity, kind) {
      const time = formatTick(globalTick);
      events.unshift({
        time,
        pod: podName,
        msg,
        severity,
        kind: kind || null
      });
      // Trim if desired (keep last 200)
      if (events.length > 200) {
        events.length = 200;
      }
    }

    /**
     * State pill (Running / Pending / …) vs readiness / detail pill; layout matches all pods.
     * Bottom pill is always shown; use statusDetail from API when it adds detail.
     */
    function getPodStateAndStatus(pod) {
      const detail =
        pod.statusDetail && typeof pod.statusDetail === "string"
          ? pod.statusDetail.trim()
          : "";

      switch (pod.status) {
        case STATUS.RUNNING_READY:
          return {
            dot: "ready",
            stateLabel: "Running",
            stateCls: "envoy-pill envoy-pill-ok pod-status-line-pill",
            statusText: "Ready",
            statusPillCls: "envoy-pill-ok"
          };
        case STATUS.RUNNING_NOTREADY:
          return {
            dot: "notready",
            stateLabel: "Running",
            stateCls: "envoy-pill envoy-pill-warn pod-status-line-pill",
            statusText: detail || "Not ready",
            statusPillCls: "envoy-pill-warn"
          };
        case STATUS.PENDING:
          return {
            dot: "pending",
            stateLabel: "Pending",
            stateCls: "envoy-pill envoy-pill-warn pod-status-line-pill",
            statusText: detail || "—",
            statusPillCls: detail ? "envoy-pill-warn" : "envoy-pill-muted"
          };
        case STATUS.TERMINATING:
          return {
            dot: "terminating",
            stateLabel: "Terminating",
            stateCls: "envoy-pill envoy-pill-terminating pod-status-line-pill",
            statusText: detail || "Deleting",
            statusPillCls: "envoy-pill-terminating"
          };
        case STATUS.CRASHLOOP:
          return {
            dot: "danger blinking",
            stateLabel: "Running",
            stateCls: "envoy-pill envoy-pill-danger pod-status-line-pill",
            statusText: detail || "CrashLoopBackOff",
            statusPillCls: "envoy-pill-danger"
          };
        default:
          return {
            dot: "pending",
            stateLabel: String(pod.phase || pod.status || "Unknown"),
            stateCls: "envoy-pill envoy-pill-muted pod-status-line-pill",
            statusText: detail || "—",
            statusPillCls: detail ? "envoy-pill-warn" : "envoy-pill-muted"
          };
      }
    }

    function isPodReady(pod) {
      return pod.status === STATUS.RUNNING_READY;
    }

    function isPodUnready(pod) {
      return pod.status === STATUS.RUNNING_NOTREADY ||
             pod.status === STATUS.TERMINATING ||
             pod.status === STATUS.CRASHLOOP ||
             pod.status === STATUS.PENDING;
    }

    function isTrafficRiskPod(pod) {
      const unreadyButTrafficEligible = !isPodReady(pod) && pod.receivesTraffic === true;
      const terminatingAndStillTrafficEligible =
        pod.endpointTerminating === true &&
        pod.receivesTraffic === true &&
        (pod.endpointReady === true || pod.endpointServing === true);
      return unreadyButTrafficEligible || terminatingAndStillTrafficEligible;
    }

    function trafficRiskPodsCount() {
      return pods.filter(isTrafficRiskPod).length;
    }

    /**
     * Header release pill: red = cannot rely on /state (fetch/API error); yellow = connected
     * but waiting for first snapshot, sync warning, or traffic-risk pods; green = no risk path
     * (Issues pill is independent — endpoint anomalies do not change this color).
     */
    function mainPillStatus() {
      if (lastFetchHttpError) return "bad";
      if (!lastSuccessfulFetchAt) return "warn";
      if (trafficRiskPodsCount() > 0 || syncWarning) {
        return "warn";
      }
      return "ok";
    }

    function appendEndpointChips(parent, pod) {
      const wrap = document.createElement("div");
      wrap.className = "ep-chips";
      const title = document.createElement("span");
      title.className = "ep-chips-label";
      title.textContent = "Endpoint";
      const items = document.createElement("div");
      items.className = "ep-chips-items";
      wrap.appendChild(title);
      wrap.appendChild(items);

      function chip(key, valText, variant, tip) {
        const el = document.createElement("span");
        const pillVar =
          variant === "ok"
            ? "envoy-pill-ok"
            : variant === "bad"
              ? "envoy-pill-danger"
              : variant === "warn"
                ? "envoy-pill-warn"
                : "envoy-pill-muted";
        el.className = `envoy-pill ep-chip ${pillVar}`;
        el.title = tip || "";
        el.innerHTML = `<span class="ep-chip-key">${key}</span><span class="ep-chip-val">${valText}</span>`;
        items.appendChild(el);
      }

      if (!pod.exposed) {
        chip("slice", "absent", "neutral", "Pod not present in EndpointSlice for this Service");
        parent.appendChild(wrap);
        return;
      }

      chip(
        "ready",
        pod.endpointReady ? "T" : "F",
        pod.endpointReady ? "ok" : "bad",
        "EndpointSlice condition: ready"
      );
      chip(
        "serve",
        pod.endpointServing ? "T" : "F",
        pod.endpointServing ? "ok" : "bad",
        "EndpointSlice condition: serving"
      );
      chip(
        "term",
        pod.endpointTerminating ? "T" : "F",
        pod.endpointTerminating ? "warn" : "ok",
        "EndpointSlice condition: terminating"
      );
      parent.appendChild(wrap);
    }

    function readinessProbeMini(status) {
      switch (status) {
        case "not_configured":
          return { letter: "R", val: "—", tone: "muted", title: "Readiness: not configured in pod spec" };
        case "ready_true":
          return { letter: "R", val: "✓", tone: "ok", title: "Readiness: passing (container ready=true)" };
        case "ready_false":
          return { letter: "R", val: "✗", tone: "bad", title: "Readiness: failing / not ready (container ready=false)" };
        default:
          return { letter: "R", val: "?", tone: "muted", title: "Readiness: unknown" };
      }
    }

    function startupProbeMini(status) {
      switch (status) {
        case "not_configured":
          return { letter: "S", val: "—", tone: "muted", title: "Startup: not configured" };
        case "complete":
          return { letter: "S", val: "✓", tone: "ok", title: "Startup: complete (started=true)" };
        case "in_progress":
          return { letter: "S", val: "…", tone: "warn", title: "Startup: in progress (started=false)" };
        case "unknown_legacy":
          return { letter: "S", val: "?", tone: "muted", title: "Startup: API may not expose started field" };
        default:
          return { letter: "S", val: "?", tone: "muted", title: "Startup: unknown" };
      }
    }

    function livenessProbeMini(status) {
      switch (status) {
        case "not_configured":
          return { letter: "L", val: "—", tone: "muted", title: "Liveness: not configured" };
        case "running":
          return { letter: "L", val: "✓", tone: "ok", title: "Liveness context: container running" };
        case "crashloop":
          return { letter: "L", val: "✗", tone: "bad", title: "Liveness: CrashLoopBackOff" };
        case "waiting":
          return { letter: "L", val: "…", tone: "warn", title: "Liveness context: container waiting" };
        case "terminated":
          return { letter: "L", val: "✗", tone: "bad", title: "Liveness context: container terminated" };
        default:
          return { letter: "L", val: "?", tone: "muted", title: "Liveness: unknown" };
      }
    }

    function renderProbeStrip(parent, pod) {
      if (!Array.isArray(pod.containers) || pod.containers.length === 0) return;

      const wrap = document.createElement("div");
      wrap.className = "ep-chips";
      const hdr = document.createElement("span");
      hdr.className = "ep-chips-label";
      hdr.textContent = "Probes";
      const items = document.createElement("div");
      items.className = "ep-chips-items probe-chips-items";

      pod.containers.forEach((c) => {
        const row = document.createElement("div");
        row.className = "probe-mini-row";
        if (pod.containers.length > 1) {
          const name = document.createElement("span");
          name.className = "probe-cname";
          name.textContent = (c.name || "?") + ":";
          row.appendChild(name);
        }
        const pr = c.probes || {};
        const minis = [
          readinessProbeMini(pr.readiness?.status),
          startupProbeMini(pr.startup?.status),
          livenessProbeMini(pr.liveness?.status)
        ];
        minis.forEach((m) => {
          const pillVar =
            m.tone === "ok"
              ? "envoy-pill-ok"
              : m.tone === "warn"
                ? "envoy-pill-warn"
                : m.tone === "bad"
                  ? "envoy-pill-danger"
                  : "envoy-pill-muted";
          const s = document.createElement("span");
          s.className = `envoy-pill probe-mini ${pillVar}`;
          s.title = m.title;
          s.innerHTML = `<span class="probe-mini-letter">${m.letter}</span><span class="probe-mini-val">${m.val}</span>`;
          row.appendChild(s);
        });
        items.appendChild(row);
      });

      wrap.appendChild(hdr);
      wrap.appendChild(items);
      parent.appendChild(wrap);
    }

    function renderPodK8sDetails(card, pod) {
      const hasK8s =
        pod.phase ||
        (Array.isArray(pod.conditions) && pod.conditions.length) ||
        (Array.isArray(pod.containers) && pod.containers.length);
      if (!hasK8s) return null;

      const block = document.createElement("div");
      block.className = "pod-detail-block";
      appendEndpointChips(block, pod);
      renderProbeStrip(block, pod);

      const hasContainerSummary =
        Array.isArray(pod.containers) && pod.containers.length > 0;

      const conditionsForDetails = (Array.isArray(pod.conditions) ? pod.conditions : []).filter(
        (c) => c.type !== "Ready" && c.type !== "ContainersReady"
      );

      const hasDetailsContent =
        conditionsForDetails.length > 0 ||
        (pod.qosClass && String(pod.qosClass).trim()) ||
        (pod.nodeName && String(pod.nodeName).trim()) ||
        Boolean(pod.deletionTimestamp) ||
        hasContainerSummary;

      let detailsEl = null;
      if (hasDetailsContent) {
        const details = document.createElement("details");
        details.className = "details-toggle";
        const summary = document.createElement("summary");
        summary.textContent = "Pod details";
        details.appendChild(summary);

        const detailsBody = document.createElement("div");
        detailsBody.className = "details-body";

        if (conditionsForDetails.length) {
          const condTitle = document.createElement("div");
          condTitle.className = "pod-detail-title";
          condTitle.textContent = "Conditions";
          detailsBody.appendChild(condTitle);
          const cr = document.createElement("div");
          cr.className = "cond-row";
          conditionsForDetails.forEach((c) => {
            const chipEl = document.createElement("span");
            const isGood = c.status === "True";
            const isUnknown = c.status === "Unknown";
            const pillVar = isGood ? "envoy-pill-ok" : isUnknown ? "envoy-pill-muted" : "envoy-pill-danger";
            chipEl.className = `envoy-pill cond-chip ${pillVar}`;
            const reason = c.reason ? ` ${c.reason}` : "";
            chipEl.title = c.message || "";
            chipEl.textContent = `${c.type}=${c.status}${reason}`;
            cr.appendChild(chipEl);
          });
          detailsBody.appendChild(cr);
        }

        const specGrid = document.createElement("div");
        specGrid.className = "pod-spec-detail";
        function addSpec(label, value) {
          if (value == null || String(value).trim() === "") return;
          const l = document.createElement("div");
          l.className = "pod-spec-detail-label";
          l.textContent = label;
          const v = document.createElement("div");
          v.className = "pod-spec-detail-value";
          v.textContent = String(value);
          specGrid.appendChild(l);
          specGrid.appendChild(v);
        }
        addSpec("QoS class", pod.qosClass);
        addSpec("Node", pod.nodeName);
        if (pod.deletionTimestamp) addSpec("Deleting", pod.deletionTimestamp);
        if (specGrid.childElementCount > 0) {
          const schedTitle = document.createElement("div");
          schedTitle.className = "pod-detail-title";
          schedTitle.textContent = "Scheduling";
          detailsBody.appendChild(schedTitle);
          detailsBody.appendChild(specGrid);
        }

        if (hasContainerSummary) {
          const ctTitle = document.createElement("div");
          ctTitle.className = "pod-detail-title";
          ctTitle.textContent = "Containers";
          detailsBody.appendChild(ctTitle);
          pod.containers.forEach((c) => {
            const row = document.createElement("div");
            row.className = "pod-container-line";
            const name = c.name || "?";
            const img = String(c.image || "").trim() || "—";
            const rc = Number(c.restartCount) || 0;
            const restartBit =
              rc === 0 ? "0 restarts" : `${rc} restart${rc === 1 ? "" : "s"}`;
            const parts = [img, restartBit];
            if (c.ready === false) parts.push("not ready");
            row.textContent = `${name}: ${parts.join(" · ")}`;
            row.title = `${name}\n${img}`;
            detailsBody.appendChild(row);
          });
        }

        details.appendChild(detailsBody);
        block.appendChild(details);
        detailsEl = details;
      }

      card.appendChild(block);
      return detailsEl;
    }

    // --- Rendering ----------------------------------------------------

    function renderTopBar() {
      const serviceNameInput = document.getElementById("service-name-input");
      const timerEl = document.getElementById("global-timer");

      const healthWrap = document.getElementById("service-health-wrap");
      if (healthWrap) {
        healthWrap.classList.toggle("service-health-wrap--offline", Boolean(lastFetchHttpError));
      }

      const mainChip = document.getElementById("service-main-chip");
      if (mainChip) {
        mainChip.classList.remove(
          "service-main-chip--ok",
          "service-main-chip--warn",
          "service-main-chip--bad"
        );
        const st = mainPillStatus();
        mainChip.classList.add(
          st === "bad"
            ? "service-main-chip--bad"
            : st === "warn"
              ? "service-main-chip--warn"
              : "service-main-chip--ok"
        );
        if (lastFetchHttpError) {
          mainChip.title = `Cannot query server: ${lastFetchHttpError}`;
        } else if (!lastSuccessfulFetchAt) {
          mainChip.title = "Waiting for first snapshot from the server";
        } else {
          const bits = [];
          if (trafficRiskPodsCount() > 0) {
            bits.push(`${trafficRiskPodsCount()} traffic risk pod(s)`);
          }
          if (syncWarning) bits.push(syncWarning);
          if (bits.length) {
            mainChip.title = bits.join(" · ");
          } else if (activeEndpointAnomalyCount > 0) {
            mainChip.title = `No traffic risk pods; ${activeEndpointAnomalyCount} endpoint issue(s) — see Issues pill`;
          } else {
            mainChip.title = "No traffic risk pods, no sync warnings";
          }
        }
      }

      timerEl.textContent = formatTick(globalTick);

      const syncEl = document.getElementById("last-sync");
      if (syncEl) {
        syncEl.classList.remove("last-sync--warn");
        if (lastSuccessfulFetchAt) {
          const ago = Math.floor((Date.now() - lastSuccessfulFetchAt) / 1000);
          const clock = new Date(lastSuccessfulFetchAt).toLocaleTimeString();
          let line = `Last updated ${clock} · ${ago}s ago`;
          if (syncWarning) {
            line += ` · ${syncWarning}`;
            syncEl.classList.add("last-sync--warn");
          }
          if (lastFetchHttpError) {
            line += ` · ${lastFetchHttpError}`;
            syncEl.classList.add("last-sync--warn");
          }
          syncEl.textContent = line;
        } else {
          syncEl.textContent =
            lastFetchHttpError || syncWarning
              ? `No snapshot yet · ${lastFetchHttpError || syncWarning}`
              : "Last updated: —";
          if (lastFetchHttpError || syncWarning) syncEl.classList.add("last-sync--warn");
        }
      }
    }

    function formatAutoscaleMetric(n) {
      if (n == null || Number.isNaN(n)) return "—";
      const a = Math.abs(n);
      if (a >= 1000) return n.toFixed(0);
      if (a >= 10) return n.toFixed(1);
      return n.toFixed(2);
    }

    function formatReplicaCell(n) {
      if (n == null || Number.isNaN(n)) return "—";
      return String(n);
    }

    function copyAutoscalePromqlQuery(query, textareaEl, onDone) {
      if (!query) return;
      const finish = () => {
        if (typeof onDone === "function") onDone();
      };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(query).then(finish, () => {
          if (textareaEl) {
            textareaEl.focus();
            textareaEl.select();
            try {
              if (document.execCommand("copy")) finish();
            } catch (_) {}
          }
        });
      } else if (textareaEl) {
        textareaEl.focus();
        textareaEl.select();
        try {
          if (document.execCommand("copy")) finish();
        } catch (_) {}
      }
    }

    function appendAutoscaleReplicaGrid(panel, as) {
      const pill = document.createElement("div");
      pill.className = "envoy-pill autoscale-replicas-pill";
      const hpaName = as.scaledObjectStatus && as.scaledObjectStatus.hpaName;
      pill.title = hpaName
        ? `Current and target from HPA "${hpaName}"; min/max from ScaledObject (or HPA spec if SO omits them).`
        : "Current and target from workload Deployment/StatefulSet when HPA is not listed yet; min/max from ScaledObject.";

      const lb = document.createElement("span");
      lb.className = "envoy-pill-label";
      lb.textContent = "replicas";
      pill.appendChild(lb);

      const stats = document.createElement("div");
      stats.className = "autoscale-replica-stats";

      const cur = as.currentReplicas;
      const tgt = as.desiredReplicas;
      const scaling =
        cur != null &&
        tgt != null &&
        typeof cur === "number" &&
        typeof tgt === "number" &&
        cur !== tgt;

      function seg(label, value, pending) {
        const s = document.createElement("span");
        s.className =
          "autoscale-replica-seg" +
          (pending && scaling ? " autoscale-replica-seg--pending" : "");
        const k = document.createElement("span");
        k.className = "autoscale-replica-seg-k";
        k.textContent = label;
        const v = document.createElement("span");
        v.className = "autoscale-replica-seg-v";
        v.textContent = formatReplicaCell(value);
        s.appendChild(k);
        s.appendChild(v);
        stats.appendChild(s);
      }

      seg("min", as.minReplicas, false);
      seg("cur", as.currentReplicas, true);
      seg("tgt", as.desiredReplicas, true);
      seg("max", as.maxReplicas, false);
      pill.appendChild(stats);
      panel.appendChild(pill);
    }

    function autoscaleAppendLabeledPill(panel, label, value, extraClass, title) {
      const d = document.createElement("div");
      d.className = "envoy-pill" + (extraClass ? " " + extraClass : "");
      if (title) d.title = title;
      const lb = document.createElement("span");
      lb.className = "envoy-pill-label";
      lb.textContent = label;
      d.appendChild(lb);
      d.appendChild(document.createTextNode(" " + value));
      panel.appendChild(d);
      return d;
    }

    function conditionChipClass(cond) {
      const t = cond.type || "";
      if (/^Fallback$/i.test(t)) return "muted";
      const st = cond.status;
      if (st === "True") return "ok";
      if (st === "False") {
        if (/^(Ready|Active)$/i.test(t)) return "bad";
        return "bad";
      }
      return "";
    }

    function renderAutoscalePanel() {
      const panel = document.getElementById("autoscaling-panel");
      if (!panel) return;
      panel.innerHTML = "";

      const as = lastAutoscaleSnapshot;
      if (!as) {
        const d = document.createElement("div");
        d.className = "envoy-pill envoy-pill-warn";
        d.textContent = "No autoscale data yet";
        panel.appendChild(d);
        return;
      }

      if (!as.scaledObjectName && as.hint) {
        const d = document.createElement("div");
        d.className = "envoy-pill envoy-pill-warn";
        d.style.whiteSpace = "normal";
        d.style.maxWidth = "100%";
        d.textContent = as.hint;
        panel.appendChild(d);
        return;
      }

      const soSt = as.scaledObjectStatus;
      const conds = soSt && Array.isArray(soSt.conditions) ? soSt.conditions : [];

      const rowStatus = document.createElement("div");
      rowStatus.className = "autoscale-row autoscale-row--status";
      conds.forEach((c) => {
        const cls = conditionChipClass(c);
        let pcls = "envoy-pill-warn";
        if (cls === "ok") pcls = "envoy-pill-ok";
        else if (cls === "bad") pcls = "envoy-pill-danger";
        else if (cls === "muted") pcls = "envoy-pill-muted";
        const d = document.createElement("div");
        d.className = "envoy-pill " + pcls;
        const lb = document.createElement("span");
        lb.className = "envoy-pill-label";
        lb.textContent = c.type || "cond";
        d.appendChild(lb);
        d.appendChild(document.createTextNode(` ${c.status || "—"}`));
        const hint = [c.reason, c.message].filter(Boolean).join(" — ");
        d.title = hint || "";
        rowStatus.appendChild(d);
      });
      if (conds.length) panel.appendChild(rowStatus);

      const rowMetrics = document.createElement("div");
      rowMetrics.className = "autoscale-row autoscale-row--metrics";

      if (as.prometheusTrigger) {
        const pt = as.prometheusTrigger;
        const valOk = as.metricValue != null && !Number.isNaN(as.metricValue);
        const displayLoad = valOk ? formatAutoscaleMetric(as.metricValue) : "—";
        const thDisplay =
          as.threshold != null && !Number.isNaN(as.threshold)
            ? String(as.threshold)
            : pt.threshold || "—";

        let loadPillCls = "envoy-pill-ok";
        if (as.prometheusError) loadPillCls = "envoy-pill-danger";
        else if (as.aboveThreshold === true && valOk) loadPillCls = "envoy-pill-warn";

        let loadText = `${displayLoad} / ${thDisplay}`;
        if (as.aboveThreshold === true && valOk) loadText += " · high";
        let loadTitle = "";
        if (as.prometheusError) loadTitle = as.prometheusError;
        else if (as.aboveThreshold === true && valOk) {
          loadTitle =
            "Load is above the scale-up threshold (KEDA can add replicas per policy).";
        }
        autoscaleAppendLabeledPill(rowMetrics, "load", loadText, loadPillCls, loadTitle || undefined);

        appendAutoscaleReplicaGrid(rowMetrics, as);

        if (as.activationThreshold != null && !Number.isNaN(as.activationThreshold)) {
          autoscaleAppendLabeledPill(
            rowMetrics,
            "activate",
            `≤${formatAutoscaleMetric(as.activationThreshold)}`
          );
        } else if (pt.activationThreshold) {
          autoscaleAppendLabeledPill(rowMetrics, "activate", `≤${pt.activationThreshold}`);
        }

        if (as.prometheusError) {
          const errLine = document.createElement("p");
          errLine.className = "autoscaling-prometheus-error";
          errLine.textContent = as.prometheusError;
          rowMetrics.appendChild(errLine);
        }

        panel.appendChild(rowMetrics);

        if (pt.query) {
          const rowPromql = document.createElement("div");
          rowPromql.className = "autoscale-row autoscale-row--promql";

          const det = document.createElement("details");
          det.className = "autoscaling-promql details-toggle";
          det.open = autoscalePromqlDetailsOpen;
          const sum = document.createElement("summary");
          sum.textContent = "Scaling metric";
          const body = document.createElement("div");
          body.className = "details-body";
          const ta = document.createElement("textarea");
          ta.className = "autoscaling-query-input";
          ta.readOnly = true;
          ta.setAttribute("spellcheck", "false");
          ta.setAttribute("aria-label", "PromQL query");
          ta.value = pt.query;
          ta.addEventListener("click", (e) => e.stopPropagation());

          const actions = document.createElement("div");
          actions.className = "autoscale-promql-actions";
          const copyBtn = document.createElement("button");
          copyBtn.type = "button";
          copyBtn.className = "autoscale-promql-copy-btn";
          copyBtn.title = "Copy PromQL";
          copyBtn.setAttribute("aria-label", "Copy PromQL query");
          const copyLabel = document.createElement("span");
          copyLabel.className = "autoscale-promql-copy-label";
          copyLabel.textContent = "Copy";
          copyBtn.innerHTML =
            '<svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
          copyBtn.appendChild(copyLabel);

          const flashCopyFeedback = () => {
            copyBtn.classList.add("autoscale-promql-copy-btn--done");
            const prev = copyBtn.title;
            const prevLabel = copyLabel.textContent;
            copyBtn.title = "Copied";
            copyLabel.textContent = "Copied";
            setTimeout(() => {
              copyBtn.classList.remove("autoscale-promql-copy-btn--done");
              copyBtn.title = prev;
              copyLabel.textContent = prevLabel;
            }, 1500);
          };

          copyBtn.addEventListener("click", (e) => {
            e.preventDefault();
            e.stopPropagation();
            copyAutoscalePromqlQuery(pt.query, ta, flashCopyFeedback);
          });

          actions.appendChild(copyBtn);
          body.appendChild(ta);
          body.appendChild(actions);
          det.appendChild(sum);
          det.appendChild(body);

          function fitAutoscalePromqlTextareaHeight() {
            if (!det.open) return;
            ta.style.height = "auto";
            ta.style.height = `${Math.max(ta.scrollHeight, 64)}px`;
          }

          det.addEventListener("toggle", () => {
            autoscalePromqlDetailsOpen = det.open;
            if (det.open) requestAnimationFrame(fitAutoscalePromqlTextareaHeight);
          });
          requestAnimationFrame(() => {
            if (det.open) fitAutoscalePromqlTextareaHeight();
          });
          rowPromql.appendChild(det);
          panel.appendChild(rowPromql);
        }
      } else {
        appendAutoscaleReplicaGrid(rowMetrics, as);
        if (as.scaledObjectName && as.hint) {
          const d = document.createElement("div");
          d.className = "envoy-pill envoy-pill-warn";
          d.style.whiteSpace = "normal";
          d.style.maxWidth = "100%";
          d.textContent = as.hint;
          rowMetrics.appendChild(d);
        }
        panel.appendChild(rowMetrics);
      }
    }

    function renderAlertBanner() {
      const riskCount = trafficRiskPodsCount();
      const issueCount = activeEndpointAnomalyCount;

      const riskPill = document.getElementById("header-risk-pill");
      const riskText = document.getElementById("header-risk-text");
      const issuesPill = document.getElementById("header-issues-pill");
      const issuesText = document.getElementById("header-issues-text");
      const okPill = document.getElementById("header-ok-pill");

      const show = (el, on) => {
        if (!el) return;
        el.style.display = on ? "inline-flex" : "none";
      };

      if (riskCount === 0 && issueCount === 0) {
        show(okPill, true);
        show(riskPill, false);
        show(issuesPill, false);
        if (okPill) okPill.title = "No traffic risks and no active issues (Envoy, endpoints, KEDA, Gateway, …).";
        return;
      }

      show(okPill, false);
      show(riskPill, riskCount > 0);
      show(issuesPill, issueCount > 0);

      if (riskText) riskText.textContent = `Risk ${riskCount}`;
      if (riskPill) {
        riskPill.title = `${riskCount} risky pod(s): EndpointSlice can still route to unready/terminating pods (explicit ready/serving or implicit unset conditions).`;
      }

      if (issuesText) issuesText.textContent = `Issues ${issueCount}`;
      if (issuesPill) {
        const w = activeEndpointIssueWarnCount;
        const d = activeEndpointIssueDangerCount;
        issuesPill.title = `${issueCount} open issue(s) from last /state (${d} serious, ${w} warn).`;
      }
    }

    function normalizeActivePodFilter() {
      if (pods.length === 0) {
        activeFilter = "all";
      } else if (podCountForFilter(activeFilter) === 0) {
        activeFilter = "all";
      }
    }

    function renderPods() {
      normalizeActivePodFilter();
      const grid = document.getElementById("pods-grid");
      let filtered = pods;

      if (activeFilter === "ready") {
        filtered = pods.filter(p => isPodReady(p));
      } else if (activeFilter === "notready") {
        filtered = pods.filter(p => !isPodReady(p));
      } else if (activeFilter === "exposed-unready") {
        filtered = pods.filter(isTrafficRiskPod);
      }
      filtered = [...filtered].sort(
        (a, b) => ageTextToSeconds(b.age) - ageTextToSeconds(a.age)
      );

      grid.innerHTML = "";

      filtered.forEach(pod => {
        const ns = namespaceFromUi();
        const podDetailsKey = `${ns}/${pod.id}`;

        const stateStatus = getPodStateAndStatus(pod);
        const exposedUnready = isTrafficRiskPod(pod);

        const card = document.createElement("div");
        card.className = "pod-card";
        if (exposedUnready) card.classList.add("exposed-unready");

        const header = document.createElement("div");
        header.className = "pod-header";

        const title = document.createElement("div");
        title.className = "pod-title";

        let marker;
        if (exposedUnready) {
          marker = document.createElement("span");
          marker.className = "status-marker-traffic-risk";
          marker.textContent = "\u26A0";
          marker.setAttribute("role", "img");
          marker.setAttribute(
            "aria-label",
            "Traffic risk: pod is not ready but may still receive traffic via EndpointSlice"
          );
          marker.title =
            "Traffic risk: EndpointSlice can still route to this pod while it is not ready (check ready / serving / terminating).";
        } else {
          marker = document.createElement("div");
          marker.className = "status-dot " + stateStatus.dot;
        }

        const name = document.createElement("div");
        name.className = "pod-name";
        name.textContent = pod.id;

        title.appendChild(marker);
        title.appendChild(name);
        header.appendChild(title);

        const badges = document.createElement("div");
        badges.className = "pod-badges";

        const statusCol = document.createElement("div");
        statusCol.className = "pod-status-column";

        const stateBadge = document.createElement("span");
        stateBadge.className = stateStatus.stateCls;
        const stateInner = document.createElement("span");
        stateInner.className = "pod-status-line-text";
        stateInner.textContent = stateStatus.stateLabel;
        stateBadge.appendChild(stateInner);
        stateBadge.title = stateStatus.stateLabel;
        statusCol.appendChild(stateBadge);

        const statusBadge = document.createElement("span");
        statusBadge.className =
          "envoy-pill pod-status-line-pill " + stateStatus.statusPillCls;
        const statusInner = document.createElement("span");
        statusInner.className = "pod-status-line-text";
        statusInner.textContent = stateStatus.statusText;
        statusBadge.appendChild(statusInner);
        statusBadge.title = stateStatus.statusText;
        statusCol.appendChild(statusBadge);

        badges.appendChild(statusCol);

        const meta = document.createElement("div");
        meta.className = "pod-meta";

        function addRow(label, value) {
          const l = document.createElement("div");
          l.className = "pod-meta-label";
          l.textContent = label;
          const v = document.createElement("div");
          v.className = "pod-meta-value";
          v.textContent = value;
          meta.appendChild(l);
          meta.appendChild(v);
        }

        addRow("IP", pod.ip || "—");
        addRow("Restarts", String(pod.restarts));
        addRow("Age", pod.age);

        card.appendChild(header);
        card.appendChild(badges);
        card.appendChild(meta);
        const detailsEl = renderPodK8sDetails(card, pod);

        if (detailsEl) {
          if (openPodK8sDetailsIds.has(podDetailsKey)) detailsEl.open = true;
          detailsEl.addEventListener("toggle", () => {
            if (detailsEl.open) openPodK8sDetailsIds.add(podDetailsKey);
            else openPodK8sDetailsIds.delete(podDetailsKey);
          });
        }

        card.addEventListener("click", (e) => {
          if (!detailsEl) return;
          const clickedSummary = e.target && e.target.closest && e.target.closest("summary");
          if (clickedSummary) return;
          detailsEl.open = !detailsEl.open;
          if (detailsEl.open) openPodK8sDetailsIds.add(podDetailsKey);
          else openPodK8sDetailsIds.delete(podDetailsKey);
        });

        grid.appendChild(card);
      });
    }

    function appendEnvoyPill(panel, label, valueText, pillClass, title) {
      const pill = document.createElement("div");
      pill.className = "envoy-pill" + (pillClass ? " " + pillClass : "");
      if (title) pill.title = title;
      const lb = document.createElement("span");
      lb.className = "envoy-pill-label";
      lb.textContent = label;
      pill.appendChild(lb);
      pill.appendChild(document.createTextNode(" " + valueText));
      panel.appendChild(pill);
    }

    function formatEnvoyCount(n) {
      const x = Number(n) || 0;
      if (x >= 1_000_000) return `${(x / 1_000_000).toFixed(1)}M`;
      if (x >= 10_000) return `${(x / 1_000).toFixed(1)}k`;
      return String(x);
    }

    /** Count plus share of the displayed classes total so percentages sum to 100%. */
    function formatEnvoyResponseCodeDisplay(count, codesClassTotal) {
      const c = Number(count) || 0;
      const t = Number(codesClassTotal) || 0;
      const countStr = formatEnvoyCount(c);
      if (t <= 0) return `${countStr} · —`;
      return `${countStr} · ${((c / t) * 100).toFixed(1)}%`;
    }

    function appendEnvoySection(panel, titleText) {
      const sec = document.createElement("div");
      sec.className = "envoy-panel-section";
      const h = document.createElement("div");
      h.className = "envoy-panel-section-title";
      h.textContent = titleText;
      const row = document.createElement("div");
      row.className = "envoy-panel-section-pills";
      sec.appendChild(h);
      sec.appendChild(row);
      panel.appendChild(sec);
      return row;
    }

    function appendEnvoyResponseCodePills(pillsRoot, s) {
      const rq2 = Number(s.rq2xx) || 0;
      const rq4 = Number(s.rq4xx) || 0;
      const rq5 = Number(s.rq5xx) || 0;
      const codesClassTotal = rq2 + rq4 + rq5;
      const rows = [
        { label: "2xx", val: rq2, clsIfNonZero: "envoy-pill-ok" },
        { label: "4xx", val: rq4, clsIfNonZero: "envoy-pill-warn" },
        { label: "5xx", val: rq5, clsIfNonZero: "envoy-pill-danger" }
      ];
      for (const r of rows) {
        const cls = r.val === 0 ? "envoy-pill-muted" : r.clsIfNonZero;
        appendEnvoyPill(
          pillsRoot,
          r.label,
          formatEnvoyResponseCodeDisplay(r.val, codesClassTotal),
          cls
        );
      }
    }

    function appendEnvoyConnectionPills(pillsRoot, s) {
      const active = s.cxActive;
      const activeOk = typeof active === "number" && Number.isFinite(active);
      const activeN = activeOk ? Number(active) : NaN;
      const activeText = activeOk ? formatEnvoyCount(active) : "—";
      const activeCls =
        !activeOk || activeN === 0 ? "envoy-pill-muted" : "envoy-pill-ok";
      appendEnvoyPill(
        pillsRoot,
        "active",
        activeText,
        activeCls,
        "Open upstream connections now (cluster.upstream_cx_active)"
      );

      const failed =
        (Number(s.cxConnectFail) || 0) +
        (Number(s.cxConnectTimeout) || 0) +
        (Number(s.cxOverflow) || 0) +
        (Number(s.cxProtocolError) || 0);
      appendEnvoyPill(
        pillsRoot,
        "failed",
        formatEnvoyCount(failed),
        failed > 0 ? "envoy-pill-danger" : "envoy-pill-muted",
        "Sum of connect_fail + connect_timeout + overflow + protocol_error (upstream_cx_*)."
      );

      const totalOpen = Number(s.cxTotal) || 0;
      appendEnvoyPill(
        pillsRoot,
        "total opened",
        formatEnvoyCount(totalOpen),
        totalOpen > 0 ? "" : "envoy-pill-muted",
        "Connections opened since process start (cluster.upstream_cx_total)"
      );

      const destroyed =
        (Number(s.cxDestroyLocal) || 0) + (Number(s.cxDestroyRemote) || 0);
      appendEnvoyPill(
        pillsRoot,
        "total destroyed",
        formatEnvoyCount(destroyed),
        destroyed > 0 ? "" : "envoy-pill-muted",
        "destroy_local + destroy_remote (cluster.upstream_cx_destroy_local / _remote)."
      );
    }

    function renderEnvoyPanel() {
      const panel = document.getElementById("envoy-panel");
      if (!panel) return;
      panel.innerHTML = "";

      const ev = lastProxySnapshot && lastProxySnapshot.envoy;
      if (!ev) {
        const pill = document.createElement("div");
        pill.className = "envoy-pill envoy-pill-muted";
        pill.textContent = "Envoy admin not configured";
        panel.appendChild(pill);
        return;
      }

      if (!ev.configured) {
        const pill = document.createElement("div");
        pill.className = "envoy-pill envoy-pill-warn";
        pill.textContent = ev.hint || "Envoy admin not configured";
        panel.appendChild(pill);
        return;
      }

      if (ev.statsSummary && ev.statsSummary.rqTotal != null) {
        const s = ev.statsSummary;
        const head = document.createElement("div");
        head.className = "envoy-upstream-head";
        const tritonLbEndpointsText =
          s.upstreamMemberCount != null ? String(s.upstreamMemberCount) : "—";
        appendEnvoyPill(
          head,
          "Load balancer endpoints",
          tritonLbEndpointsText,
          tritonLbEndpointsText === "—" ? "envoy-pill-muted" : "envoy-pill-ok",
          "Active Triton endpoints in the load balancer: addresses the filtered upstream cluster has toward Triton (Envoy admin /clusters; ENVOY_CLUSTER_FILTER)."
        );
        appendEnvoyPill(
          head,
          "requests",
          formatEnvoyCount(s.rqTotal),
          "envoy-pill-ok",
          "upstream_rq_total for this cluster"
        );
        panel.appendChild(head);
        const cxRow = appendEnvoySection(panel, "Connections");
        appendEnvoyConnectionPills(cxRow, s);
        const codesRow = appendEnvoySection(panel, "Response codes");
        appendEnvoyResponseCodePills(codesRow, s);
      } else if (!ev.error) {
        const pill = document.createElement("div");
        pill.className = "envoy-pill envoy-pill-warn";
        pill.textContent = "No upstream request stats from admin /stats yet";
        panel.appendChild(pill);
      }

      if (ev.error) {
        const pill = document.createElement("div");
        pill.className = "envoy-pill envoy-pill-danger";
        pill.textContent = ev.error.length > 80 ? ev.error.slice(0, 78) + "…" : ev.error;
        panel.appendChild(pill);
      }
    }

    function renderEnvoyGatewayPanel() {
      const panel = document.getElementById("envoy-gateway-panel");
      if (!panel) return;
      panel.innerHTML = "";

      const eg = lastProxySnapshot && lastProxySnapshot.envoyGateway;
      if (!eg) {
        const pill = document.createElement("div");
        pill.className = "envoy-pill envoy-pill-muted";
        pill.textContent = "Envoy Gateway data not in response (update backend)";
        panel.appendChild(pill);
        return;
      }

      if (eg.error) {
        const pill = document.createElement("div");
        pill.className = "envoy-pill envoy-pill-danger";
        pill.textContent = eg.error.length > 100 ? eg.error.slice(0, 98) + "…" : eg.error;
        panel.appendChild(pill);
        return;
      }

      const hasAny =
        eg.gateway ||
        (eg.gateways && eg.gateways.length) ||
        (eg.grpcRoutes && eg.grpcRoutes.length);

      if (!hasAny) {
        const pill = document.createElement("div");
        pill.className = "envoy-pill envoy-pill-warn";
        pill.textContent = eg.hint || "No Gateway API resources in this namespace";
        panel.appendChild(pill);
        return;
      }

      const gateways = [];
      if (eg.gateway) gateways.push(eg.gateway);
      else if (eg.gateways && eg.gateways.length) gateways.push(...eg.gateways);

      gateways.forEach((g) => {
        if (!g) return;
        const prog = (g.conditions || []).find((c) => c.type === "Programmed");
        const readyC = (g.conditions || []).find((c) => c.type === "Ready");
        const gwPill = document.createElement("div");
        gwPill.className = "envoy-pill envoy-pill-ok";
        gwPill.title = g.className ? `GatewayClass: ${g.className}` : "";
        const gwLb = document.createElement("span");
        gwLb.className = "envoy-pill-label";
        gwLb.textContent = "Gateway";
        gwPill.appendChild(gwLb);
        gwPill.appendChild(document.createTextNode(" " + (g.name || "—")));
        panel.appendChild(gwPill);

        const progSt = prog ? prog.status : "?";
        appendEnvoyPill(
          panel,
          "Programmed",
          progSt,
          progSt === "True" ? "envoy-pill-ok" : "envoy-pill-warn"
        );

        const readySt = readyC ? readyC.status : "?";
        appendEnvoyPill(
          panel,
          "Ready",
          readySt,
          readySt === "True" ? "envoy-pill-ok" : "envoy-pill-warn"
        );
      });

      const routes = eg.grpcRoutes || [];
      routes.forEach((r) => {
        const flat = (r.parentConditions || []).flatMap((p) => p.conditions || []);
        const accepted = flat.find((c) => c.type === "Accepted");
        const st = accepted ? accepted.status : "?";
        const ok = accepted && accepted.status === "True";
        appendEnvoyPill(panel, "GRPCRoute", r.name || "—", "envoy-pill-ok");
        appendEnvoyPill(panel, "Accepted", st, ok ? "envoy-pill-ok" : "envoy-pill-warn");
      });
    }

    function renderEvents() {
      const list = document.getElementById("events-list");
      list.innerHTML = "";
      events.forEach(ev => {
        const row = document.createElement("div");
        row.className = "event-row";

        const time = document.createElement("div");
        time.className = "event-time";
        time.textContent = ev.time;

        const pod = document.createElement("div");
        pod.className = "event-pod";
        pod.textContent = ev.pod;

        const msg = document.createElement("div");
        msg.className = "event-msg";
        if (ev.severity === SEVERITY.OK) msg.classList.add("event-ok");
        else if (ev.severity === SEVERITY.WARN) msg.classList.add("event-warn");
        else if (ev.severity === SEVERITY.DANGER) msg.classList.add("event-danger");

        let fullTitle = ev.msg;
        if (ev.kind === "traffic-risk") {
          const tag = document.createElement("span");
          tag.className = "event-kind event-kind--traffic";
          tag.textContent = "Traffic risk";
          msg.appendChild(tag);
          fullTitle = `[Traffic risk] ${ev.msg}`;
        }
        msg.appendChild(document.createTextNode(ev.msg));
        msg.title = fullTitle;

        row.appendChild(time);
        row.appendChild(pod);
        row.appendChild(msg);
        list.appendChild(row);

        row.addEventListener("click", () => {
          row.classList.toggle("expanded");
        });
      });
    }

    function renderAll() {
      renderTopBar();
      renderAlertBanner();
      renderAutoscalePanel();
      renderPods();
      renderEnvoyPanel();
      renderEnvoyGatewayPanel();
      renderEvents();
      updateFilterButtons();
    }

    // --- Filters & buttons --------------------------------------------

    function podCountForFilter(filterKey) {
      if (filterKey === "all") return pods.length;
      if (filterKey === "ready") return pods.filter((p) => isPodReady(p)).length;
      if (filterKey === "notready") return pods.filter((p) => !isPodReady(p)).length;
      if (filterKey === "exposed-unready")
        return pods.filter((p) => isTrafficRiskPod(p)).length;
      return 0;
    }

    function updateFilterButtons() {
      const mapping = [
        { id: "filter-all", key: "all" },
        { id: "filter-ready", key: "ready" },
        { id: "filter-notready", key: "notready" },
        { id: "filter-exposed-unready", key: "exposed-unready" }
      ];

      mapping.forEach(({ id, key }) => {
        const btn = document.getElementById(id);
        btn.classList.remove("active");
        const n = podCountForFilter(key);
        btn.disabled = n === 0;
        btn.title = n === 0 ? "No pods in this category" : "";
      });

      if (activeFilter === "all") document.getElementById("filter-all").classList.add("active");
      else if (activeFilter === "ready") document.getElementById("filter-ready").classList.add("active");
      else if (activeFilter === "notready") document.getElementById("filter-notready").classList.add("active");
      else if (activeFilter === "exposed-unready")
        document.getElementById("filter-exposed-unready").classList.add("active");
    }

    // --- Global tick --------------------------------------------------

    function trackTrafficRisk(podList) {
      const current = new Set(
        podList
          .filter(isTrafficRiskPod)
          .map(p => p.id)
      );

      current.forEach(id => {
        if (!lastTrafficRiskIds.has(id)) {
          // If this pod already has an EndpointSlice issue, don't double-log.
          if (currentEndpointAnomalyPods.has(id)) return;
          trafficRiskEverCount += 1;
          appendEvent(
            id,
            "Pod is unready while EndpointSlice can still route to it (check ready/serving/terminating conditions).",
            SEVERITY.DANGER,
            "traffic-risk"
          );
        }
      });

      lastTrafficRiskIds = current;
    }

    function trackEndpointAnomalies(anomalies) {
      const items = Array.isArray(anomalies) ? anomalies : [];
      activeEndpointAnomalyCount = items.length;
      activeEndpointIssueWarnCount = items.filter((a) => a?.severity === "warn").length;
      activeEndpointIssueDangerCount = items.filter((a) => a?.severity !== "warn").length;
      currentEndpointAnomalyPods = new Set(
        items.map((a) => String(a?.pod || "")).filter((p) => p && p !== "unknown")
      );
      items.forEach((a) => {
        const key = a?.key || `${a?.endpointIP || "ip"}:${a?.pod || "pod"}:${a?.msg || "msg"}`;
        if (seenAnomalyKeys.has(key)) return;
        seenAnomalyKeys.add(key);
        appendEvent(
          a?.pod || "endpoint",
          a?.msg || "Traffic-target issue detected.",
          a?.severity === "warn" ? SEVERITY.WARN : SEVERITY.DANGER
        );
      });
    }

    async function refreshFromBackend() {
      if (backendRefreshBusy) {
        backendRefreshQueued = true;
        return;
      }
      backendRefreshBusy = true;
      try {
        do {
          backendRefreshQueued = false;
          const serviceNameInput = document.getElementById("service-name-input");
          const namespace = namespaceFromUi();
          const serviceName = serviceNameInput?.value || service.name || "sonic-interlink";

          try {
            const url = `${BACKEND_URL}?namespace=${encodeURIComponent(
              namespace
            )}&service=${encodeURIComponent(serviceName)}`;
            const resp = await fetch(url);

            if (!resp.ok) {
              lastFetchHttpError = `HTTP ${resp.status}`;
              renderAll();
              continue;
            }
            const data = await resp.json();

            if (data && data.error) {
              lastFetchHttpError =
                typeof data.message === "string" ? data.message : String(data.error);
              renderAll();
              continue;
            }

            lastFetchHttpError = null;

            if (data.service) {
              service.clusterIP = data.service.clusterIP || "";
              if (Array.isArray(data.service.ports)) {
                service.ports = data.service.ports;
              }
              service.name = serviceName;
              service.namespace = namespace;
            }

            const incomingPods = data.pods;
            if (Array.isArray(incomingPods)) {
              if (incomingPods.length > 0) {
                pods = incomingPods;
                syncWarning = null;
              } else if (pods.length === 0) {
                pods = [];
                syncWarning = null;
              } else {
                syncWarning = "API returned 0 pods — keeping previous snapshot";
              }
            }

            if (Array.isArray(data.anomalies)) {
              trackEndpointAnomalies(data.anomalies);
            } else {
              currentEndpointAnomalyPods = new Set();
              activeEndpointAnomalyCount = 0;
              activeEndpointIssueWarnCount = 0;
              activeEndpointIssueDangerCount = 0;
            }

            // Run after endpoint anomalies are updated so we can suppress duplicates.
            trackTrafficRisk(pods);

            if (data.proxy) {
              lastProxySnapshot = data.proxy;
            }
            lastAutoscaleSnapshot = data.autoscale != null ? data.autoscale : null;

            lastSuccessfulFetchAt = Date.now();
            renderAll();
          } catch (e) {
            lastFetchHttpError = e && e.message ? e.message : "fetch failed";
            // eslint-disable-next-line no-console
            console.error("Failed to refresh from backend", e);
            renderAll();
          }
        } while (backendRefreshQueued);
      } finally {
        backendRefreshBusy = false;
      }
    }

    function globalTickStep() {
      globalTick += 1;
      renderAll();
    }

    // --- Initialization -----------------------------------------------

    const THEME_STORAGE_KEY = "service-monitor-theme";

    function getThemeMode() {
      const t = document.documentElement.dataset.theme;
      return t === "light" || t === "dark" || t === "system" ? t : "system";
    }

    function syncThemeButtons() {
      const mode = getThemeMode();
      document.querySelectorAll("[data-theme-pick]").forEach((btn) => {
        const pick = btn.getAttribute("data-theme-pick");
        btn.setAttribute("aria-pressed", pick === mode ? "true" : "false");
      });
    }

    function setThemeMode(mode) {
      const m = mode === "light" || mode === "dark" || mode === "system" ? mode : "system";
      document.documentElement.dataset.theme = m;
      try {
        localStorage.setItem(THEME_STORAGE_KEY, m);
      } catch (e) {
        /* ignore */
      }
      syncThemeButtons();
    }

    function attachThemeHandlers() {
      syncThemeButtons();
      document.querySelectorAll("[data-theme-pick]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const pick = btn.getAttribute("data-theme-pick");
          if (pick === "light" || pick === "dark" || pick === "system") {
            setThemeMode(pick);
          }
        });
      });
    }

    function attachHandlers() {
      attachThemeHandlers();

      const serviceNameInput = document.getElementById("service-name-input");

      if (serviceNameInput) {
        service.name = (serviceNameInput.value || "").trim() || service.name;
        const onReleaseCommit = () => {
          const t = (serviceNameInput.value || "").trim();
          if (!t) return;
          serviceNameInput.value = t;
          service.name = t;
          syncWarning = "Release changed — waiting for fresh snapshot";
          openPodK8sDetailsIds.clear();
          autoscalePromqlDetailsOpen = false;
      renderAll();
          refreshFromBackend();
        };
        serviceNameInput.addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            onReleaseCommit();
          }
        });
      }

      document.getElementById("filter-all").addEventListener("click", () => {
        activeFilter = "all";
        renderAll();
      });
      document.getElementById("filter-ready").addEventListener("click", () => {
        activeFilter = "ready";
        renderAll();
      });
      document.getElementById("filter-notready").addEventListener("click", () => {
        activeFilter = "notready";
        renderAll();
      });
      document.getElementById("filter-exposed-unready").addEventListener("click", () => {
        activeFilter = "exposed-unready";
        renderAll();
      });

      const nsInput = document.getElementById("namespace-input");
      if (nsInput) {
        const onNamespaceCommit = () => {
          const t = (nsInput.value || "").trim() || "sonic";
          nsInput.value = t;
          service.namespace = t;
          syncWarning = "Namespace changed — waiting for fresh snapshot";
          openPodK8sDetailsIds.clear();
          autoscalePromqlDetailsOpen = false;
        renderAll();
          refreshFromBackend();
        };
        nsInput.addEventListener("keydown", e => {
          if (e.key === "Enter") {
            e.preventDefault();
            onNamespaceCommit();
          }
        });
      }

    }

    // TODO: connect to real data via kubectl proxy
    //   GET /api/v1/namespaces/{ns}/pods?watch=true
    //   GET /apis/discovery.k8s.io/v1/namespaces/{ns}/endpointslices

    window.addEventListener("load", () => {
      attachHandlers();
      renderAll();
      // Global 1s tick loop (clock + relative timestamps)
      setInterval(globalTickStep, 1000);
      // Backend refresh loop (cluster data via kubectl wrapper)
      setInterval(refreshFromBackend, 1000);
      // Prime from backend once at startup
      refreshFromBackend();
    });
  </script>
</body>
