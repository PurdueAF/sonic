apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: sonic-proxy-config
  namespace: sonic
spec:
  # Data-plane: connection + upstream debug for UC / remote close; http debug is very noisy (flow control).
  logging:
    level:
      default: warn
      connection: debug
      upstream: debug
      http: warn
      router: debug
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        container:
          resources:
            requests:
              cpu: "100m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
      envoyService:
        type: LoadBalancer
        annotations:
          metallb.universe.tf/address-pool: geddes-private-pool
  telemetry:
    accessLog:
      settings:
        - matches:
            - response.code >= 500 || (has(response.grpc_status) && response.grpc_status > 0)
          sinks:
            - type: File
              file:
                path: /dev/stdout
