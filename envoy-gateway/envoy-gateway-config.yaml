apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-gateway-config
  namespace: envoy-gateway-system
data:
  envoy-gateway.yaml: |
    apiVersion: gateway.envoyproxy.io/v1alpha1
    kind: EnvoyGateway
    # Control-plane (envoy-gateway deployment) logs — xDS / translation issues.
    logging:
      level:
        default: info
        gateway-api: debug
        xds-translator: debug
        xds-server: debug
    provider:
      type: Kubernetes
      kubernetes:
        deploy:
          type: GatewayNamespace
        watch:
          type: Namespaces
          namespaces:
            - sonic
